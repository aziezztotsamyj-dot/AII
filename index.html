<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Гений AI</title>

<style>
body {
    font-family: Arial;
    background: #fff;
    margin: 0;
    text-align: center;
}

header {
    background: gold;
    padding: 20px;
}

.cards {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

.card {
    background: #fff8dc;
    padding: 20px;
    border-radius: 10px;
    transition: 0.3s;
    cursor: pointer;
    animation: fade 1s;
}

.card:hover {
    transform: scale(1.1);
    background: gold;
}

#chatBox {
    border: 1px solid gold;
    height: 200px;
    overflow-y: auto;
    padding: 10px;
    margin: 10px;
}

button {
    background: gold;
    border: none;
    padding: 10px;
    cursor: pointer;
}

button:hover {
    background: orange;
}

@keyframes fade {
    from {opacity: 0;}
    to {opacity: 1;}
}

@media (max-width: 600px) {
    .cards {
        flex-direction: column;
    }
}
</style>

</head>
<body>

<header>
    <h1>Гений AI</h1>
</header>

<select id="mode">
    <option value="simple">Қарапайым</option>
    <option value="smart">Ақылды</option>
    <option value="super">Супер</option>
    <option value="ultra">Ультра</option>
</select>

<div class="cards">
    <div class="card">Код генерациясы</div>
    <div class="card">Идея генерациясы</div>
    <div class="card">Түсіндіру</div>
</div>

<h2>Менің тәжірибем</h2>

<div>Сұраныстар саны: <span id="count">0</span></div>

<div id="chatBox"></div>

<input type="text" id="userInput" placeholder="Сұраныс жаз...">
<button onclick="sendMessage()">Жіберу</button>

<h2>Сурет генерациясы</h2>
<input type="text" id="imgPrompt" placeholder="Сурет сипаттамасы">
<button onclick="generateImage()">Сурет жасау</button>

<div id="imageResult"></div>

<script>
let count = 0;

// ⚠️ ҚАУІПТІ: кейін ауыстыр!
const API_KEY = "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";

async function sendMessage() {
    const input = document.getElementById("userInput");
    const chatBox = document.getElementById("chatBox");
    const mode = document.getElementById("mode").value;

    const text = input.value.trim();
    if (!text) return;

    chatBox.innerHTML += `<p><b>Сен:</b> ${text}</p>`;
    input.value = "";

    count++;
    document.getElementById("count").innerText = count;

    const typing = document.createElement("p");
    typing.id = "typing";
    typing.innerHTML = "<b>Гений AI:</b> typing...";
    chatBox.appendChild(typing);

    let systemPrompt = "";

    if (mode === "simple") systemPrompt = "Қысқа жауап бер";
    if (mode === "smart") systemPrompt = "Ақылды жауап бер";
    if (mode === "super") systemPrompt = "Толық жауап бер";
    if (mode === "ultra") systemPrompt = "Өте терең жауап бер";

    try {
        const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${API_KEY}`
            },
            body: JSON.stringify({
                model: "llama3-70b-8192",
                messages: [
                    { role: "system", content: systemPrompt },
                    { role: "user", content: text }
                ]
            })
        });

        const data = await res.json();

        document.getElementById("typing").remove();

        const reply = data.choices[0].message.content;

        chatBox.innerHTML += `<p><b>Гений AI:</b> ${reply}</p>`;
        chatBox.scrollTop = chatBox.scrollHeight;

    } catch (e) {
        document.getElementById("typing").remove();
        chatBox.innerHTML += `<p>Қате шықты</p>`;
    }
}

// DEMO image
function generateImage() {
    const prompt = document.getElementById("imgPrompt").value;
    const result = document.getElementById("imageResult");

    if (!prompt) return;

    result.innerHTML = "Сурет генерация демо режимінде ⚡";
}
</script>

</body>
</html>
